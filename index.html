<!DOCTYPE html>
<html lang="ru">
 

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrahanZizhka - Розово-фиолетовый каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>💜 Trahan Zizhka</h1>
        <p>Жидкости, поды, испарители и не только</p>
    </header>
    
    <button class="menu-btn" onclick="toggleMenu()">☰ Каталог</button>
    <button class="cart-btn" onclick="toggleCart()">🛒 Корзина (<span id="cart-count">0</span>)</button>
    
    <!-- Боковое меню -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="toggleMenu()">✕</button>
        <h2>📂 Категории</h2>
                <div class="filter-section">
            <h3>Тип товара:</h3>
            <label class="filter-option">
                <input type="radio" name="category" value="all" checked onchange="filterProducts()">
                <span>Все товары</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="category" value="liquid" onchange="filterProducts()">
                <span>Жидкости</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="category" value="pod" onchange="filterProducts()">
                <span>Одноразки</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="category" value="consumables" onchange="filterProducts()">
                <span>Расходники</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="category" value="cigarettes" onchange="filterProducts()">
                <span>Сигареты</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="category" value="snus" onchange="filterProducts()">
                <span>Снюс</span>
            </label>
        </div>
        
              <div class="filter-section">
            <h3>Производитель:</h3>
            <label class="filter-option">
                <input type="radio" name="brand" value="all" checked onchange="filterProducts()">
                <span>Все бренды</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="jord" onchange="filterProducts()">
                <span>🔥 Jord (энергинки, жидкости)</span>
            </label>
             
            <label class="filter-option">
                <input type="radio" name="brand" value="vaporesso" onchange="filterProducts()">
                <span>🔧 Vaporesso (картриджи)</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="geekvape" onchange="filterProducts()">
                <span>🔧 GeekVape (испарители)</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="marlboro" onchange="filterProducts()">
                <span>🚬 Marlboro (сигареты)</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="lostmary" onchange="filterProducts()">
                <span>☁️ Lost Mary (поды)</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="udn" onchange="filterProducts()">
                <span>☁️ UÐN (поды)</span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="podonki" onchange="filterProducts()">
                <span>☁️ Podonki </span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="duft" onchange="filterProducts()">
                <span>☁️ Duft </span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="puffmi" onchange="filterProducts()">
                <span>☁️ Puffmi </span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="husky" onchange="filterProducts()">
                <span>☁️ Husky </span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="plonq" onchange="filterProducts()">
                <span>☁️ Plonq </span>
            </label>
            <label class="filter-option">
                <input type="radio" name="brand" value="soak" onchange="filterProducts()">
                <span>☁️ Soak </span>
            </label>
        </div>
    </div>
    
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <main class="catalog" id="catalog"></main>
    
    <div class="cart-modal" id="cart-modal">
        <div class="cart-content">
            <button class="cart-close" onclick="toggleCart()">✕</button>
            <h2>🛒 Ваша корзина</h2>
            <div id="cart-items"></div>
            <div class="cart-total">Итого: <span id="cart-total">0</span> BYN</div>
            <input type="text" id="customer-username" placeholder="👆 Введи свой юзернейм Telegram (обязательно)" required style="width: 95%; padding: 12px; margin: 15px auto; border-radius: 12px; border: 2px solid #ff6edb; background: #2d1b4e; color: #fff; font-size: 16px; font-weight: bold; display: block;">
            <button class="checkout-btn" onclick="checkoutToTelegram()">💜 Оформить через Telegram</button>
        </div>
    </div>
    
    <footer>
        <p>© 2026 Vape Shop Минск | Заказ: <a href="https://t.me/TrahanZizhka" target="_blank">@TrahanZizhka</a></p>
    </footer>
    
    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="main.js"></script>
    <!-- Модальное окно выбора вкуса -->
<div id="flavor-modal" class="flavor-modal">
    <div class="flavor-content">
        <button class="flavor-close" onclick="document.getElementById('flavor-modal').style.display='none'">×</button>
        <h2 id="flavor-modal-title">Выберите вкус</h2>
        <div class="flavor-price" id="flavor-modal-price"></div>
        <div id="flavor-list"></div>
        <button class="add-flavor-btn" onclick="addFlavoredToCart()">💜 Добавить в корзину</button>
    </div>
</div>
</body>
</html>
